<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Perfil de Usuario</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-image-container">
                    <img id="profileImage" src="" alt="Foto de perfil" class="profile-image">
                </div>
                <h1 id="fullName" class="full-name">Cargando...</h1>
                <p class="age" id="age"></p>
            </div>

            <div class="profile-info">
                <div class="info-section">
                    <h3><i class="fas fa-address-card"></i> Información de Contacto</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <i class="fas fa-envelope"></i>
                            <div>
                                <span class="info-label">Email</span>
                                <p id="email" class="info-value">-</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-phone"></i>
                            <div>
                                <span class="info-label">Teléfono</span>
                                <p id="phone" class="info-value">-</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <div>
                                <span class="info-label">Dirección</span>
                                <p id="address" class="info-value">-</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="info-section">
                    <h3><i class="fas fa-user"></i> Biografía</h3>
                    <p id="bio" class="bio-text">-</p>
                </div>

                <div class="info-section">
                    <h3><i class="fas fa-code"></i> Habilidades e Intereses</h3>
                    <div id="skills" class="skills-container"></div>
                </div>

                <div class="info-section">
                    <h3><i class="fas fa-share-alt"></i> Redes Sociales</h3>
                    <div id="socialLinks" class="social-links"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
